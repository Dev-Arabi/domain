name: Validate Domain Registry
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'

      - name: Install Linting Packages
        run: npm ci

      - name: Run Core Code Validator
        run: npm run validate
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Compile JSON Registry Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const files = fs.readdirSync('domains');
          const result = [];
          files.forEach(f => {
            if(f.endsWith('.json') && f !== 'example.json') {
              const data = JSON.parse(fs.readFileSync('domains/' + f, 'utf8'));
              result.push({ subdomain: f.replace('.json', '').toLowerCase(), records: data.records });
            }
          });
          fs.writeFileSync('dist-domains.json', JSON.stringify(result));
          "

      - name: Create creds.json for DNSControl Preview
        run: |
          echo '{
            "cloudflare": {
              "TYPE": "CLOUDFLAREAPI",
              "apitoken": "'"$CLOUDFLARE_API_TOKEN"'"
            }
          }' > creds.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.DOMAIN }}

      - name: Install DNSControl
        uses: gacts/install-dnscontrol@v1

      - name: DNSControl Lint & Preview Simulation
        run: dnscontrol preview
